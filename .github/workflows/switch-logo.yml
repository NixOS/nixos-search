name: Switch Logo

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 31 5 *" # Change to pride logo. "At 00:00 on day-of-month 31 in May."
    - cron: "0 0 1 7 *"  # Switch back to normal logo. "At 00:00 on day-of-month 1 in July."

jobs:
  swap-logo:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Switch Logo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date +'%m-%d')
          if [ "$TODAY" == "05-31" ]; then
            sed --in-place 's|/images/nix-logo\.png|/images/nix-logo-pride.png|g' frontend/src/Main.elm
            branch="chore/use-pride-logo"
            commit_msg="chore(logo): use pride logo"
            pr_title="chore(logo): use pride logo"
            pr_body="Switches the logo to the pride variant for June. 🏳️‍🌈"
          elif [ "$TODAY" == "07-01" ]; then
            sed --in-place 's|/images/nix-logo-pride\.png|/images/nix-logo.png|g' frontend/src/Main.elm
            branch="chore/revert-pride-logo"
            commit_msg="chore(logo): switch back to normal logo"
            pr_title="chore(logo): switch back to normal logo"
            pr_body="Reverts the logo back to the standard variant after June."
          else
            echo "No action needed for logo today."
            exit 0
          fi

          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout -b "$branch"
          git add frontend/src/Main.elm
          git commit --message "$commit_msg"
          git push origin "$branch"
          gh pr create \
            --title "$pr_title" \
            --body "$pr_body" \
            --base main \
            --head "$branch"
